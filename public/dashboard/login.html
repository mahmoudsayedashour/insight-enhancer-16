<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Greko Egypt – Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:Inter,sans-serif;color:#f0f4ff}
  body{
    min-height:100vh;display:grid;place-items:center;
    background:
      radial-gradient(1200px 800px at 15% 20%, rgba(0,180,216,.22), transparent 60%),
      radial-gradient(900px 700px at 85% 80%, rgba(0,82,204,.35), transparent 60%),
      linear-gradient(135deg,#020722 0%,#03153a 55%,#031d55 100%);
  }
  .card{
    width:min(420px,92vw);
    background:rgba(10,22,50,.72);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:40px 34px 32px;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }
  .brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:24px}
  .brand img{width:96px;height:auto;filter:drop-shadow(0 4px 12px rgba(0,180,216,.35))}
  .brand h1{font-size:20px;letter-spacing:.5px;font-weight:800}
  .brand p{font-size:12px;color:#8899bb;text-transform:uppercase;letter-spacing:2px}
  label{display:block;font-size:12px;color:#8899bb;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;font-weight:600}
  input{
    width:100%;padding:12px 14px;border-radius:10px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
    color:#f0f4ff;font-size:14px;font-family:inherit;outline:none;transition:.2s;
  }
  input:focus{border-color:#00B4D8;box-shadow:0 0 0 3px rgba(0,180,216,.2)}
  button{
    width:100%;margin-top:22px;padding:13px;border:0;border-radius:10px;
    background:linear-gradient(135deg,#0052CC,#00B4D8);color:#fff;font-weight:700;
    font-size:14px;letter-spacing:.5px;cursor:pointer;transition:.2s;font-family:inherit;
  }
  button:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(0,180,216,.35)}
  .error{margin-top:14px;padding:10px 12px;background:rgba(239,71,111,.15);border:1px solid rgba(239,71,111,.4);color:#ffb3c6;border-radius:8px;font-size:13px;display:none}
  .error.show{display:block}
  .footer{margin-top:22px;text-align:center;font-size:11px;color:#8899bb}
</style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <div class="brand">
      <img src="greko_logo.png" alt="Greko" onerror="this.style.display='none'">
      <h1>Greko Company Dashboard</h1>
      <p>Sales Analytics</p>
    </div>
    <label for="u">Username</label>
    <input id="u" name="username" type="text" autocomplete="username" required>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
    <div class="error" id="err">Invalid username or password.</div>
    <div class="footer">© Greko Egypt · Authorised access only</div>
  </form>
<script>
  // If already signed in, jump to dashboard
  if(localStorage.getItem('greko_auth')==='1'){ location.replace('index.html'); }
  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const u=document.getElementById('u').value.trim();
    const p=document.getElementById('p').value;
    if(u==='mahmoudashour' && p==='Greko@2026'){
      localStorage.setItem('greko_auth','1');
      localStorage.setItem('greko_user',u);
      location.replace('index.html');
    } else {
      document.getElementById('err').classList.add('show');
    }
  });
</script>
</body>
</html>
