<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greko Egypt – YTD Dashboard</title>
  <meta name="description" content="Greko Egypt sales analytics dashboard">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Measure Toggle Switch */
    .measure-toggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 4px;
      gap: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .measure-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }
    .measure-btn.active {
      background: var(--accent-blue);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,82,204,0.3);
    }
    /* Insight Panel */
    .insights-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .insight-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .insight-item i { font-size: 20px; }
    .insight-details { display: flex; flex-direction: column; gap: 4px; }
    .insight-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;}
    .insight-val { font-size: 14px; color: #fff; font-weight: 700; line-height: 1.3;}
    
    /* Quarter Slicer */
    .q-slicer {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .q-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 24px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }
    .q-btn:hover { background: rgba(255,255,255,0.05); }
    .q-btn.active {
      background: var(--accent-cyan);
      color: #0a1628;
      border-color: var(--accent-cyan);
    }
    
    /* Tables */
    .data-table th { cursor: pointer; user-select: none; text-align: left; }
    .data-table th.num { text-align: right; }
    .data-table th:hover { background: rgba(255,255,255,0.05); }
    .data-table th[data-sort]::after { content: ' \2195'; opacity: 0.3; font-size: 10px; margin-left: 4px;}

    /* Month filter + theme toggle */
    .month-filter {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle, rgba(255,255,255,0.1));
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle, rgba(255,255,255,0.1));
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }
    .theme-toggle:hover { background: var(--bg-card-hover); }

    /* Tabs (Channel Performance) */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border-subtle, rgba(255,255,255,0.08)); }
    .tab-btn {
      background: transparent; border: none; color: var(--text-secondary);
      padding: 10px 20px; cursor: pointer; font-weight: 600; font-size: 13px;
      border-bottom: 2px solid transparent; transition: all .2s;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

    /* KPI clickable state */
    .kpi-card.clickable { cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .kpi-card.clickable:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,180,216,0.15); }
    .kpi-card.selected { outline: 2px solid var(--accent-cyan); }

    /* Search input */
    .search-input {
      background: var(--bg-card); border: 1px solid var(--border-subtle, rgba(255,255,255,0.1));
      color: var(--text-primary); padding: 8px 12px; border-radius: 8px; font-size: 13px;
      width: 260px; margin-bottom: 12px;
    }
    .filter-note {
      font-size: 12px; color: var(--text-muted); margin: -8px 0 12px;
      padding: 8px 12px; background: rgba(0,180,216,0.06); border-left: 3px solid var(--accent-cyan);
      border-radius: 4px;
    }

    /* ============= LIGHT THEME ============= */
    html[data-theme="light"] {
      --bg-primary: #f4f6fb;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f0f4fb;
      --bg-glass: rgba(255,255,255,0.85);
      --bg-glass-light: rgba(0,0,0,0.03);
      --bg-sidebar: #ffffff;
      --text-primary: #0a1628;
      --text-secondary: #495a75;
      --text-muted: #7b8aa3;
      --border-subtle: rgba(0,48,135,0.10);
      --shadow-card: 0 4px 16px rgba(10,22,40,0.08);
      --shadow-glow: 0 0 20px rgba(0,180,216,0.15);
      --shadow-deep: 0 12px 40px rgba(10,22,40,0.10);
    }
    html[data-theme="light"] body { background: var(--bg-primary); color: var(--text-primary); }
    html[data-theme="light"] .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border-subtle); }
    html[data-theme="light"] .nav-item { color: var(--text-secondary); }
    html[data-theme="light"] .nav-item:hover, html[data-theme="light"] .nav-item.active { color: var(--greko-blue); background: rgba(0,48,135,0.06); }
    html[data-theme="light"] .topbar { background: var(--bg-secondary); border-bottom: 1px solid var(--border-subtle); }
    html[data-theme="light"] .kpi-card, html[data-theme="light"] .chart-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-card);
    }
    html[data-theme="light"] .data-table th { background: #f0f4fb; color: var(--text-primary); }
    html[data-theme="light"] .data-table td { border-color: var(--border-subtle); color: var(--text-primary); }
    html[data-theme="light"] .measure-toggle, html[data-theme="light"] .month-filter, html[data-theme="light"] .theme-toggle {
      background: var(--bg-card); border: 1px solid var(--border-subtle); color: var(--text-primary);
    }
    html[data-theme="light"] .measure-btn { color: var(--text-secondary); }
    html[data-theme="light"] .q-btn { background: var(--bg-card); border: 1px solid var(--border-subtle); color: var(--text-secondary); }
    html[data-theme="light"] .insight-item { background: var(--bg-card); border: 1px solid var(--border-subtle); }
    html[data-theme="light"] .insight-val { color: var(--text-primary); }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="greko_logo.png" alt="Greko Egypt" class="brand-logo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="brand-text-fallback" style="display:none;flex-direction:column;align-items:center;gap:2px">
        <span class="brand-greko">greko</span><span class="brand-egypt">EGYPT</span>
      </div>
    </div>
    <div class="sidebar-year-badge" id="ytd-label-top">Jan-Jun 25 vs Jan-Jul 26</div>
    <ul class="nav-menu">
      <li><a href="#" class="nav-item active" data-page="home"><span class="nav-icon">🏠</span><span class="nav-label">Executive Dashboard</span></a></li>
      <li><a href="#" class="nav-item" data-page="ytd"><span class="nav-icon">📊</span><span class="nav-label">YTD Performance</span></a></li>
      <li><a href="#" class="nav-item" data-page="products"><span class="nav-icon">🧀</span><span class="nav-label">Product Analysis</span></a></li>
      <li><a href="#" class="nav-item" data-page="customers"><span class="nav-icon">👥</span><span class="nav-label">Customer Analysis</span></a></li>
      <li><a href="#" class="nav-item" data-page="returns"><span class="nav-icon">↩️</span><span class="nav-label">Returns Analysis</span></a></li>
      <li><a href="#" class="nav-item" data-page="growth"><span class="nav-icon">📈</span><span class="nav-label">Growth Analysis</span></a></li>
      <li><a href="#" class="nav-item" data-page="monthly"><span class="nav-icon">📅</span><span class="nav-label">Monthly Trend</span></a></li>
      <li><a href="#" class="nav-item" data-page="quarterly"><span class="nav-icon">📋</span><span class="nav-label">Quarterly Dashboard</span></a></li>
      <li><a href="#" class="nav-item" data-page="comparison"><span class="nav-icon">⚖️</span><span class="nav-label">Year Comparison</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="data-refresh">Updated: <span id="last-update">–</span></div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main-content">
    <div class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
      <div class="topbar-title" id="page-title">Executive Dashboard</div>
      <div class="topbar-actions">
        <!-- Global Slicer -->
        <div class="measure-toggle">
          <button class="measure-btn active" data-measure="ton">Ton</button>
          <button class="measure-btn" data-measure="carton">Carton</button>
        </div>
      </div>
    </div>

    <!-- Pages -->
    <div class="page active" id="page-home"></div>
    <div class="page" id="page-ytd"></div>
    <div class="page" id="page-products"></div>
    <div class="page" id="page-customers"></div>
    <div class="page" id="page-returns"></div>
    <div class="page" id="page-growth"></div>
    <div class="page" id="page-monthly"></div>
    <div class="page" id="page-quarterly"></div>
    <div class="page" id="page-comparison"></div>
  </main>

  <div class="loading-overlay" id="loading-overlay">
    <div class="loader-box">
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading Data…</div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
